version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pulseapi_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pulseapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pulseapi_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/pulseapi
      - SECRET_KEY=d7a9b08f4c0627e7f919cf62be44d320857ef51a7e58a5c37894a45a31a9829f
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pulseapi_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
